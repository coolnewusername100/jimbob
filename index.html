<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JimBob</title>
  <style>
    /* =============================================
       COLOURS — change these to restyle the site
    ============================================= */
    :root {
      --white:       #ffffff;
      --off-white:   #f7f7f7;
      --light-grey:  #e8e8e8;
      --mid-grey:    #aaaaaa;
      --dark-grey:   #444444;
      --black:       #111111;
      --red:         #cc0000;
    }

    /* =============================================
       RESET & BASE
    ============================================= */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      font-size: 14px;
      background: var(--white);
      color: var(--black);
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    button {
      font-family: Arial, sans-serif;
      cursor: pointer;
      border: none;
      background: none;
    }

    input {
      font-family: Arial, sans-serif;
      font-size: 14px;
    }

    /* =============================================
       LAYOUT — sidebar + main area side by side
    ============================================= */
    #sidebar {
      width: 220px;
      min-width: 220px;
      height: 100vh;
      border-right: 1px solid var(--light-grey);
      background: var(--off-white);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    #main {
      flex: 1;
      height: 100vh;
      overflow-y: auto;
      padding: 32px;
    }

    /* =============================================
       SIDEBAR — top button (website name)
    ============================================= */
    #home-btn {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      font-weight: bold;
      text-align: left;
      border-bottom: 1px solid var(--light-grey);
      color: var(--black);
    }

    #home-btn:hover { background: var(--light-grey); }

    /* =============================================
       SIDEBAR — page type sections
    ============================================= */
    .section { border-bottom: 1px solid var(--light-grey); }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
    }

    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--mid-grey);
    }

    .add-page-btn {
      font-size: 18px;
      color: var(--mid-grey);
      line-height: 1;
      padding: 0 4px;
    }

    .add-page-btn:hover { color: var(--black); }

    .page-link {
      display: block;
      width: 100%;
      text-align: left;
      padding: 7px 16px 7px 24px;
      color: var(--dark-grey);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .page-link:hover { background: var(--light-grey); }

    .page-link.active {
      background: var(--light-grey);
      color: var(--black);
      font-weight: bold;
      border-left: 3px solid var(--black);
      padding-left: 21px;
    }

    /* =============================================
       MAIN AREA — home screen
    ============================================= */
    #home-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
    }

    #home-hello {
      font-size: 24px;
      color: var(--mid-grey);
    }

    #settings-btn {
      font-size: 12px;
      color: var(--mid-grey);
      border: 1px solid var(--light-grey);
      border-radius: 3px;
      padding: 6px 14px;
      letter-spacing: 0.05em;
    }

    #settings-btn:hover { background: var(--light-grey); color: var(--black); }

    /* Settings panel listing all pages with delete buttons */
    #settings-panel {
      display: none;
      width: 100%;
      max-width: 400px;
      border: 1px solid var(--light-grey);
      border-radius: 4px;
      overflow: hidden;
    }

    #settings-panel.open { display: block; }

    .settings-section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--mid-grey);
      padding: 8px 14px;
      background: var(--off-white);
      border-bottom: 1px solid var(--light-grey);
    }

    .settings-page-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      border-bottom: 1px solid var(--light-grey);
      font-size: 13px;
    }

    .settings-page-row:last-child { border-bottom: none; }

    .delete-page-btn {
      font-size: 12px;
      color: var(--mid-grey);
      border: 1px solid var(--light-grey);
      border-radius: 3px;
      padding: 3px 10px;
    }

    .delete-page-btn:hover { color: var(--red); border-color: var(--red); }

    /* =============================================
       MAIN AREA — page header
    ============================================= */
    #page-title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--light-grey);
    }

    /* =============================================
       PAGE TYPE 1 — three stacked boxes
    ============================================= */
    .time-box {
      border: 1px solid var(--light-grey);
      border-radius: 4px;
      margin-bottom: 16px;
    }

    .time-box-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid var(--light-grey);
      background: var(--off-white);
    }

    .time-box-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--dark-grey);
    }

    .add-entry-btn {
      font-size: 18px;
      color: var(--mid-grey);
      line-height: 1;
    }

    .add-entry-btn:hover { color: var(--black); }

    .entry-row {
      display: flex;
      align-items: center;
      padding: 6px 12px;
      border-bottom: 1px solid var(--light-grey);
      gap: 8px;
    }

    .entry-row:last-child { border-bottom: none; }

    .entry-bullet {
      color: var(--mid-grey);
      font-size: 16px;
      flex-shrink: 0;
    }

    .entry-input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: var(--black);
      font-size: 13px;
    }

    .delete-entry-btn {
      color: var(--mid-grey);
      font-size: 14px;
      padding: 2px 4px;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .entry-row:hover .delete-entry-btn { opacity: 1; }
    .delete-entry-btn:hover { color: var(--black); }

    .empty-box {
      padding: 10px 12px;
      color: var(--mid-grey);
      font-size: 12px;
      font-style: italic;
    }

    /* =============================================
       PAGE TYPE 2 — placeholder
    ============================================= */
    #page-type-2-content {
      color: var(--mid-grey);
      font-style: italic;
    }

    /* =============================================
       MODAL — add new page
    ============================================= */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #modal-overlay.open { display: flex; }

    #modal {
      background: var(--white);
      border: 1px solid var(--light-grey);
      border-radius: 4px;
      padding: 24px;
      width: 300px;
    }

    #modal h3 { margin-bottom: 16px; font-size: 14px; }

    #modal input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--light-grey);
      border-radius: 3px;
      margin-bottom: 12px;
      outline: none;
    }

    #modal input:focus { border-color: var(--dark-grey); }

    .modal-buttons {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .modal-buttons button {
      padding: 7px 16px;
      border-radius: 3px;
      font-size: 13px;
    }

    #modal-cancel { border: 1px solid var(--light-grey); color: var(--dark-grey); }
    #modal-cancel:hover { background: var(--off-white); }
    #modal-confirm { background: var(--black); color: var(--white); }
    #modal-confirm:hover { background: var(--dark-grey); }

    /* =============================================
       CONFIRM DELETE PAGE MODAL
    ============================================= */
    #confirm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    #confirm-overlay.open { display: flex; }

    #confirm-modal {
      background: var(--white);
      border: 1px solid var(--light-grey);
      border-radius: 4px;
      padding: 24px;
      width: 300px;
    }

    #confirm-modal h3 { font-size: 14px; margin-bottom: 8px; }

    #confirm-modal p {
      font-size: 13px;
      color: var(--dark-grey);
      margin-bottom: 20px;
    }

    #confirm-modal p strong { color: var(--black); }

    .confirm-buttons {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .confirm-buttons button {
      padding: 7px 16px;
      border-radius: 3px;
      font-size: 13px;
    }

    #confirm-cancel { border: 1px solid var(--light-grey); color: var(--dark-grey); }
    #confirm-cancel:hover { background: var(--off-white); }
    #confirm-delete { background: var(--red); color: var(--white); }
    #confirm-delete:hover { background: #aa0000; }

    /* =============================================
       SETUP BANNER — for Supabase keys
    ============================================= */
    #setup-banner {
      background: var(--off-white);
      border: 1px solid var(--light-grey);
      border-radius: 4px;
      padding: 16px;
      margin-bottom: 24px;
    }

    #setup-banner p { margin-bottom: 10px; color: var(--dark-grey); }

    #setup-banner input {
      display: block;
      width: 100%;
      padding: 7px 10px;
      border: 1px solid var(--light-grey);
      border-radius: 3px;
      margin-bottom: 8px;
      outline: none;
    }

    #setup-banner button {
      padding: 7px 16px;
      background: var(--black);
      color: var(--white);
      border-radius: 3px;
      font-size: 13px;
    }

    #setup-banner button:hover { background: var(--dark-grey); }

    /* =============================================
       MOBILE — sidebar slides in from left
    ============================================= */
    #mobile-toggle {
      display: none;
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 50;
      font-size: 20px;
      background: var(--white);
      border: 1px solid var(--light-grey);
      border-radius: 3px;
      padding: 4px 10px;
    }

    @media (max-width: 600px) {
      #sidebar {
        position: fixed;
        top: 0; left: 0;
        height: 100vh;
        z-index: 40;
        transform: translateX(-100%);
        transition: transform 0.25s ease;
        box-shadow: 4px 0 16px rgba(0,0,0,0.1);
        width: 80%;
        max-width: 280px;
      }

      #sidebar.open { transform: translateX(0); }

      #sidebar-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.2);
        z-index: 39;
      }

      #sidebar-overlay.open { display: block; }

      #mobile-toggle { display: block; }

      #main { padding: 16px; padding-top: 52px; }
    }
  </style>
</head>
<body>

  <!-- MOBILE: hamburger button -->
  <button id="mobile-toggle" onclick="toggleSidebar()">☰</button>

  <!-- MOBILE: dim overlay behind sidebar -->
  <div id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- =============================================
       SIDEBAR
  ============================================= -->
  <div id="sidebar">

    <button id="home-btn" onclick="showHome()">JimBob</button>

    <!-- Page Type 1 section -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">Page Type 1</span>
        <button class="add-page-btn" onclick="openModal('type1')">+</button>
      </div>
      <div id="sidebar-type1"></div>
    </div>

    <!-- Page Type 2 section -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">Page Type 2</span>
        <button class="add-page-btn" onclick="openModal('type2')">+</button>
      </div>
      <div id="sidebar-type2"></div>
    </div>

  </div>

  <!-- =============================================
       MAIN CONTENT AREA
  ============================================= -->
  <div id="main">

    <!-- Supabase setup banner -->
    <div id="setup-banner">
      <p>One-time setup: enter your Supabase URL and anon key.</p>
      <input type="text" id="cfg-url" placeholder="https://xxxxxx.supabase.co" />
      <input type="text" id="cfg-key" placeholder="anon key (eyJhbGci...)" />
      <button onclick="saveConfig()">Save & Connect</button>
    </div>

    <!-- Home screen -->
    <div id="home-screen">
      <div id="home-hello">Hello :)</div>
      <button id="settings-btn" onclick="toggleSettings()">⚙ Settings</button>

      <!-- Settings panel — lists all pages with delete buttons -->
      <div id="settings-panel">
        <div id="settings-type1"></div>
        <div id="settings-type2"></div>
      </div>
    </div>

    <!-- Page content -->
    <div id="page-content" style="display:none">
      <div id="page-title"></div>
      <div id="page-body"></div>
    </div>

  </div>

  <!-- =============================================
       MODAL — add new page
  ============================================= -->
  <div id="modal-overlay">
    <div id="modal">
      <h3 id="modal-title">Add new page</h3>
      <input type="text" id="modal-input" placeholder="Page name" />
      <div class="modal-buttons">
        <button id="modal-cancel" onclick="closeModal()">Cancel</button>
        <button id="modal-confirm" onclick="confirmModal()">Add</button>
      </div>
    </div>
  </div>

  <!-- =============================================
       CONFIRM DELETE MODAL
  ============================================= -->
  <div id="confirm-overlay">
    <div id="confirm-modal">
      <h3>Are you sure?</h3>
      <p>You are about to delete the page <strong id="confirm-page-name"></strong> and all its entries. This cannot be undone.</p>
      <div class="confirm-buttons">
        <button id="confirm-cancel" onclick="closeConfirm()">Cancel</button>
        <button id="confirm-delete" onclick="confirmDeletePage()">Delete</button>
      </div>
    </div>
  </div>

  <!-- =============================================
       JAVASCRIPT
  ============================================= -->
  <script>

    // ── Supabase config ─────────────────────────────────────────────
    let URL = localStorage.getItem('jb_url') || '';
    let KEY = localStorage.getItem('jb_key') || '';

    if (URL && KEY) document.getElementById('setup-banner').style.display = 'none';

    function saveConfig() {
      URL = document.getElementById('cfg-url').value.trim().replace(/\/$/, '');
      KEY = document.getElementById('cfg-key').value.trim();
      if (!URL || !KEY) { alert('Please fill in both fields.'); return; }
      localStorage.setItem('jb_url', URL);
      localStorage.setItem('jb_key', KEY);
      document.getElementById('setup-banner').style.display = 'none';
      loadSidebar();
    }

    function headers() {
      return {
        'Content-Type': 'application/json',
        'apikey': KEY,
        'Authorization': 'Bearer ' + KEY
      };
    }

    // ── State ────────────────────────────────────────────────────────
    let activePage      = null;  // currently open page
    let pageToDelete    = null;  // page pending deletion confirmation
    let allPages        = [];    // all pages loaded from Supabase

    // ── Sidebar ──────────────────────────────────────────────────────

    async function loadSidebar() {
      if (!URL || !KEY) return;

      const res = await fetch(URL + '/rest/v1/pages?select=*&order=position', { headers: headers() });
      allPages  = await res.json();

      const type1 = allPages.filter(p => p.type === 'type1');
      const type2 = allPages.filter(p => p.type === 'type2');

      renderSidebarSection('sidebar-type1', type1);
      renderSidebarSection('sidebar-type2', type2);
      renderSettingsPanel(type1, type2);
    }

    function renderSidebarSection(containerId, pages) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      pages.forEach(page => {
        const btn = document.createElement('button');
        btn.className = 'page-link' + (activePage && activePage.id === page.id ? ' active' : '');
        btn.textContent = page.name;
        btn.onclick = () => openPage(page);
        container.appendChild(btn);
      });
    }

    // ── Settings panel ───────────────────────────────────────────────

    function toggleSettings() {
      document.getElementById('settings-panel').classList.toggle('open');
      const isOpen = document.getElementById('settings-panel').classList.contains('open');
      document.getElementById('settings-btn').textContent = isOpen ? '⚙ Close settings' : '⚙ Settings';
    }

    // Render the settings panel with all pages grouped by type
    function renderSettingsPanel(type1, type2) {
      const c1 = document.getElementById('settings-type1');
      const c2 = document.getElementById('settings-type2');

      c1.innerHTML = settingsSectionHTML('Page Type 1', type1);
      c2.innerHTML = settingsSectionHTML('Page Type 2', type2);
    }

    function settingsSectionHTML(label, pages) {
      if (pages.length === 0) return '';

      const rows = pages.map(p => `
        <div class="settings-page-row">
          <span>${escHtml(p.name)}</span>
          <button class="delete-page-btn" onclick="askDeletePage(${p.id}, '${escHtml(p.name)}')">Delete</button>
        </div>
      `).join('');

      return `<div class="settings-section-title">${label}</div>${rows}`;
    }

    // ── Pages ────────────────────────────────────────────────────────

    function showHome() {
      activePage = null;
      document.getElementById('home-screen').style.display  = 'flex';
      document.getElementById('page-content').style.display = 'none';
      document.querySelectorAll('.page-link').forEach(b => b.classList.remove('active'));
      closeSidebar();
    }

    async function openPage(page) {
      activePage = page;
      document.getElementById('home-screen').style.display  = 'none';
      document.getElementById('page-content').style.display = 'block';
      document.getElementById('page-title').textContent = page.name;

      document.querySelectorAll('.page-link').forEach(b => {
        b.classList.toggle('active', b.textContent === page.name);
      });

      if (page.type === 'type1') await renderType1(page);
      if (page.type === 'type2') renderType2();

      closeSidebar();
    }

    // ── Page Type 1 ──────────────────────────────────────────────────

    const RECENT_DAYS = 3;
    const MID_DAYS    = 3 + 21;
    const OLD_DAYS    = 3 + 21 + 90;

    function getBucket(createdAt) {
      const ageInDays = (Date.now() - new Date(createdAt)) / (1000 * 60 * 60 * 24);
      if (ageInDays < RECENT_DAYS) return 'recent';
      if (ageInDays < MID_DAYS)    return 'mid';
      if (ageInDays < OLD_DAYS)    return 'old';
      return 'expired';
    }

    async function renderType1(page) {
      const res     = await fetch(URL + `/rest/v1/jimbob_entries?page_id=eq.${page.id}&select=*&order=position`, { headers: headers() });
      const entries = await res.json();

      // Silently delete expired entries from Supabase
      const expired = entries.filter(e => getBucket(e.created_at) === 'expired');
      for (const e of expired) {
        await fetch(URL + `/rest/v1/jimbob_entries?id=eq.${e.id}`, { method: 'DELETE', headers: headers() });
      }

      const recent = entries.filter(e => getBucket(e.created_at) === 'recent');
      const mid    = entries.filter(e => getBucket(e.created_at) === 'mid');
      const old    = entries.filter(e => getBucket(e.created_at) === 'old');

      document.getElementById('page-body').innerHTML = `
        ${timeBox('Recent', recent, page.id)}
        ${timeBox('Mid',    mid,    page.id)}
        ${timeBox('Old',    old,    page.id)}
      `;
    }

    function timeBox(label, entries, pageId) {
      const entriesHTML = entries.length === 0
        ? `<div class="empty-box">No entries</div>`
        : entries.map(e => `
            <div class="entry-row" data-id="${e.id}">
              <span class="entry-bullet">·</span>
              <input class="entry-input" value="${escHtml(e.content)}"
                onblur="updateEntry(${e.id}, this.value)" />
              <button class="delete-entry-btn" onclick="deleteEntry(${e.id})">✕</button>
            </div>
          `).join('');

      return `
        <div class="time-box">
          <div class="time-box-header">
            <span class="time-box-title">${label}</span>
            <button class="add-entry-btn" onclick="addEntry(${pageId})">+</button>
          </div>
          ${entriesHTML}
        </div>
      `;
    }

    async function addEntry(pageId) {
      await fetch(URL + '/rest/v1/jimbob_entries', {
        method: 'POST',
        headers: { ...headers(), 'Prefer': 'return=representation' },
        body: JSON.stringify({ page_id: pageId, content: '', position: 0 })
      });
      await openPage(activePage);
    }

    async function updateEntry(id, newContent) {
      await fetch(URL + `/rest/v1/jimbob_entries?id=eq.${id}`, {
        method: 'PATCH',
        headers: headers(),
        body: JSON.stringify({ content: newContent })
      });
    }

    async function deleteEntry(id) {
      await fetch(URL + `/rest/v1/jimbob_entries?id=eq.${id}`, {
        method: 'DELETE',
        headers: headers()
      });
      await openPage(activePage);
    }

    // ── Page Type 2 ──────────────────────────────────────────────────

    function renderType2() {
      document.getElementById('page-body').innerHTML = `
        <p id="page-type-2-content">Page type 2 — coming soon.</p>
      `;
    }

    // ── Delete page (with confirmation) ──────────────────────────────

    function askDeletePage(pageId, pageName) {
      // Find the full page object
      pageToDelete = allPages.find(p => p.id === pageId);
      document.getElementById('confirm-page-name').textContent = '"' + pageName + '"';
      document.getElementById('confirm-overlay').classList.add('open');
    }

    function closeConfirm() {
      document.getElementById('confirm-overlay').classList.remove('open');
      pageToDelete = null;
    }

    async function confirmDeletePage() {
      if (!pageToDelete) return;

      // First delete all entries belonging to this page
      await fetch(URL + `/rest/v1/jimbob_entries?page_id=eq.${pageToDelete.id}`, {
        method: 'DELETE',
        headers: headers()
      });

      // Then delete the page itself
      await fetch(URL + `/rest/v1/pages?id=eq.${pageToDelete.id}`, {
        method: 'DELETE',
        headers: headers()
      });

      closeConfirm();

      // If the deleted page was open, go back to home
      if (activePage && activePage.id === pageToDelete.id) showHome();

      pageToDelete = null;
      await loadSidebar();
    }

    // ── Modal (add new page) ─────────────────────────────────────────

    let pendingType = null;

    function openModal(type) {
      pendingType = type;
      document.getElementById('modal-title').textContent =
        'Add new ' + (type === 'type1' ? 'Page Type 1' : 'Page Type 2');
      document.getElementById('modal-input').value = '';
      document.getElementById('modal-overlay').classList.add('open');
      document.getElementById('modal-input').focus();
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
      pendingType = null;
    }

    document.getElementById('modal-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') confirmModal();
      if (e.key === 'Escape') closeModal();
    });

    async function confirmModal() {
      const name = document.getElementById('modal-input').value.trim();
      if (!name) { alert('Please enter a page name.'); return; }

      await fetch(URL + '/rest/v1/pages', {
        method: 'POST',
        headers: { ...headers(), 'Prefer': 'return=representation' },
        body: JSON.stringify({ name: name, type: pendingType, position: 0 })
      });

      closeModal();
      await loadSidebar();
    }

    // ── Mobile sidebar ───────────────────────────────────────────────

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebar-overlay').classList.toggle('open');
      const isOpen = document.getElementById('sidebar').classList.contains('open');
      document.getElementById('mobile-toggle').style.display = isOpen ? 'none' : 'block';
    }

    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebar-overlay').classList.remove('open');
      if (window.innerWidth <= 600) document.getElementById('mobile-toggle').style.display = 'block';
    }

    // ── Utility ──────────────────────────────────────────────────────

    function escHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Init ─────────────────────────────────────────────────────────
    loadSidebar();

  </script>
</body>
</html>
